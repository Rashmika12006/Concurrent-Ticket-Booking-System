<!DOCTYPE html>
<html>
<head>
<title>Concurrent Ticket Booking</title>

<style>
body{
font-family:Arial;
background:black;
color:white;
text-align:center;
margin-top:120px;
}

button{
padding:15px 25px;
font-size:18px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}
</style>
</head>

<body>

<h1>Concurrent Ticket Booking System</h1>
<p>Redis Locking Simulation</p>

<button onclick="bookSeat()">Book Seat</button>

<h2 id="result"></h2>

<script>

let seatLocked = false;

function bookSeat(){

if(!seatLocked){

seatLocked = true;

document.getElementById("result").innerText =
"Seat booked successfully";

}else{

document.getElementById("result").innerText =
"Seat already booked (Lock prevented double booking)";

}

}

</script>

</body>
</html>
