<!DOCTYPE html>
<html>
<head>
<title>Concurrent Ticket Booking</title>

<style>
body{
font-family:Arial;
background:black;
color:white;
text-align:center;
margin-top:120px;
}

button{
padding:15px 25px;
font-size:18px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}
</style>
</head>

<body>

<h1>Concurrent Ticket Booking System</h1>
<p>Redis Locking Simulation</p>

<button onclick="bookSeat()">Book Seat</button>

<h2 id="result"></h2>

<script>

async function bookSeat(){

try{

const res = await fetch("http://localhost:3000/api/book/1",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
userId:"user"+Math.floor(Math.random()*100)
})
});

const data = await res.json();

document.getElementById("result").innerText = data.message;

}catch(err){

document.getElementById("result").innerText =
"Server not running. Start Node server.";

}

}

</script>

</body>
</html>
